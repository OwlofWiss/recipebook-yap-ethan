<!DOCTYPE html>
<html>
<head>
    <title>Recipe List</title>
</head>
<body>

<div style="
    width:100%;
    background-color:#f4a261;
    padding:20px;
    text-align:center;
    border-bottom:4px solid #333;
">
    <h1 style="
        margin:0;
        font-size:40px;
        letter-spacing:3px;
        font-family:Arial, sans-serif;
        color:white;
    ">
        RECIPE BOOK
    </h1>
</div>

<h1>Recipe List</h1>

{% for recipe in recipes %}

  <h2>{{ recipe.name }}</h2>

 <ul>
    {% for ri in recipe.recipe_ingredients.all %}
      <li>
        {{ ri.ingredient.name }} — {{ ri.quantity }}
      </li>
    {% empty %}
      <li>No ingredients yet.</li>
    {% endfor %}
  </ul>

  <a href="{{ recipe.get_absolute_url }}">
     View {{ recipe.name }}
  </a>

  <hr>

{% endfor %}

</body>
</html>
