{% extends "base.html" %}

{% block content %}

<p><strong>Author:</strong> {{ recipe.author.name }}</p>
<p><strong>Created:</strong> {{ recipe.created_on }}</p>
<p><strong>Updated:</strong> {{ recipe.updated_on }}</p>

<ul>
{% for ri in recipe.recipe_ingredients.all %}
    <li>{{ ri.ingredient.name }} — {{ ri.quantity }}</li>
{% endfor %}
</ul>

{% endblock %}
